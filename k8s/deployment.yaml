apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthpulse-api
  labels:
    app: healthpulse-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthpulse-api
  template:
    metadata:
      labels:
        app: healthpulse-api
    spec:
      containers:
      - name: api
        image: placeholder/healthpulse-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: KeyVault__Uri
          valueFrom:
            secretKeyRef:
              name: healthpulse-secrets
              key: keyVaultUri
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
